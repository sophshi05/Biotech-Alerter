<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biotech Alerter</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Biotech Alerter</h1>
      <input
        id="company-search"
        type="text"
        placeholder="Search companies..."
        oninput="filterCompanies(this.value)"
        autocomplete="off"
      >
    </div>
    <ul id="company-list">
      <li data-cik="" class="active" onclick="selectCompany(this, '')">
        <span class="co-ticker">ALL</span>
        <span class="co-name">All Companies</span>
      </li>
    </ul>
  </div>

  <!-- Main panel -->
  <div id="main">
    <div id="main-header">
      <div id="main-header-left">
        <h2 id="feed-title">Recent 8-K Filings</h2>
        <span id="last-refreshed"></span>
      </div>
      <div id="main-header-right">
        <button id="hide-routine-btn" onclick="toggleRoutine()">Hide routine</button>
        <button id="refresh-btn" onclick="triggerRefresh()">Refresh</button>
      </div>
    </div>
    <div id="news-feed">
      <p class="state-msg">Loading filings...</p>
    </div>
  </div>

  <script>
    let currentCik = '';
    let allCompanies = [];

    // ── Company list ──────────────────────────────────────────────────────────

    async function loadCompanies() {
      try {
        const res = await fetch('/api/companies');
        allCompanies = await res.json();
        renderCompanyList(allCompanies);
      } catch (e) {
        console.error('Failed to load companies:', e);
      }
    }

    function renderCompanyList(companies) {
      const ul = document.getElementById('company-list');
      while (ul.children.length > 1) ul.removeChild(ul.lastChild);

      companies.forEach(c => {
        const li = document.createElement('li');
        li.dataset.cik = c.cik;
        li.dataset.ticker = c.ticker.toLowerCase();
        li.dataset.name = c.name.toLowerCase();
        li.onclick = () => selectCompany(li, c.cik);
        li.innerHTML = `
          <span class="co-ticker">${escHtml(c.ticker)}</span>
          <span class="co-name">${escHtml(c.name)}</span>
        `;
        ul.appendChild(li);
      });

      const q = document.getElementById('company-search').value;
      if (q) filterCompanies(q);
    }

    function filterCompanies(query) {
      const q = (query || '').toLowerCase().trim();
      document.querySelectorAll('#company-list li').forEach(li => {
        if (!li.dataset.cik) { li.style.display = ''; return; }
        const ticker = li.dataset.ticker || '';
        const name = li.dataset.name || '';
        li.style.display = (!q || ticker.includes(q) || name.includes(q)) ? '' : 'none';
      });
    }

    function selectCompany(li, cik) {
      document.querySelectorAll('#company-list li').forEach(el => el.classList.remove('active'));
      li.classList.add('active');
      currentCik = cik;

      const title = document.getElementById('feed-title');
      if (!cik) {
        title.textContent = 'Recent 8-K Filings';
      } else {
        const company = allCompanies.find(c => c.cik === cik);
        title.textContent = company ? `${company.ticker} — ${company.name}` : `CIK ${cik}`;
      }
      loadNews(cik);
    }

    // ── News feed ─────────────────────────────────────────────────────────────

    async function loadNews(cik, newAccessionNos = []) {
      const feed = document.getElementById('news-feed');
      feed.innerHTML = '<p class="state-msg">Loading...</p>';

      const url = cik ? `/api/news/${cik}` : '/api/news';
      try {
        const res = await fetch(url);
        const data = await res.json();
        renderFilings(data.filings || [], newAccessionNos);
        setLastRefreshed(data.last_refreshed);
      } catch (e) {
        feed.innerHTML = '<p class="state-msg">Failed to load filings.</p>';
        console.error(e);
      }
    }

    // ── Importance classification ─────────────────────────────────────────────

    const ITEM_IMPORTANCE = {
      // High signal
      '1.01': 'high',   // Entry into material agreement (partnerships, licensing)
      '2.02': 'high',   // Results of operations / earnings
      '7.01': 'high',   // Regulation FD disclosure (often clinical data)
      '8.01': 'high',   // Other events — confirmed by keyword check below
      // Medium signal
      '1.02': 'medium', // Termination of material agreement
      '2.01': 'medium', // Completion of acquisition
      '5.02': 'medium', // Director/officer changes (upgraded to high for C-suite departure)
      // Low signal
      '3.03': 'low',
      '4.01': 'low',
      '4.02': 'low',
      '5.03': 'low',
      '5.07': 'low',
      '5.08': 'low',
      '9.01': 'low',
    };
    const RANK = { high: 3, medium: 2, normal: 1, low: 0 };

    // 8.01 keywords that confirm a genuinely important event
    const KEY_EVENT_KW = [
      // Clinical / trial data
      'phase 1','phase 2','phase 3','phase i','phase ii','phase iii',
      'topline','top-line','top line','data readout',
      'primary endpoint','statistically significant','interim analysis',
      'overall survival','progression-free','response rate',
      // FDA
      'fda','pdufa','nda ','bla ','approval','approved',
      'complete response letter','crl',
      'advisory committee','adcom','breakthrough therapy',
      'fast track','priority review',
      // Financing / offering
      'offering','underwritten','public offering','private placement',
      'at-the-market','equity financing','follow-on',
      // Executive departure
      'resign','step down','stepping down','departure',
    ];
    // 8.01 patterns that mark a routine / administrative event (override KEY_EVENT_KW)
    const ROUTINE_KW = [
      'conference call','investor presentation','webcast','investor day',
      'will present at','scheduled to present','participation in',
    ];
    // C-suite titles that make a 5.02 departure high-importance
    const KEY_EXEC_TITLES = [
      'ceo','chief executive','chief scientific','cso',
      'chief medical','cmo','chief financial','cfo',
      'president and chief',
    ];

    function classifyFiling(f) {
      const items = (f.title || '').split(',').map(s => s.trim()).filter(Boolean);
      const text  = ((f.summary || '') + ' ' + (f.title || '')).toLowerCase();

      // Max importance across all items in this filing
      let imp = 'normal';
      for (const item of items) {
        const v = ITEM_IMPORTANCE[item] || 'normal';
        if (RANK[v] > RANK[imp]) imp = v;
      }

      // 8.01: only keep 'high' if keywords confirm a real event (not routine)
      const has801 = items.includes('8.01');
      const otherHighItems = items.filter(i => i !== '8.01' && ITEM_IMPORTANCE[i] === 'high');
      if (has801 && otherHighItems.length === 0 && imp === 'high') {
        const isKey     = KEY_EVENT_KW.some(kw => text.includes(kw));
        const isRoutine = ROUTINE_KW.some(kw => text.includes(kw));
        imp = (isKey && !isRoutine) ? 'high' : 'normal';
      }

      // 5.02: upgrade to 'high' for C-suite departures
      if (items.includes('5.02') && RANK[imp] < RANK['high']) {
        const hasCTitle   = KEY_EXEC_TITLES.some(t => text.includes(t));
        const isDeparture = ['resign','step down','stepping down','depart','terminat'].some(w => text.includes(w));
        if (hasCTitle && isDeparture) imp = 'high';
      }

      return imp;
    }

    let hideRoutine = false;
    function toggleRoutine() {
      hideRoutine = !hideRoutine;
      document.getElementById('news-feed').classList.toggle('hide-low', hideRoutine);
      document.getElementById('hide-routine-btn').textContent =
        hideRoutine ? 'Show all' : 'Hide routine';
    }

    // ── SEC Item code → human-readable label ─────────────────────────────────
    const ITEM_LABELS = {
      '1.01': 'Material Definitive Agreement',
      '1.02': 'Termination of Material Agreement',
      '1.03': 'Bankruptcy or Receivership',
      '2.01': 'Acquisition or Disposition of Assets',
      '2.02': 'Financial Results',
      '2.03': 'New Financial Obligation',
      '2.04': 'Acceleration of Financial Obligation',
      '2.05': 'Exit or Disposal Activities',
      '2.06': 'Material Impairment',
      '3.01': 'Delisting Notice',
      '3.02': 'Unregistered Sale of Securities',
      '3.03': 'Modification to Security Holder Rights',
      '4.01': 'Change in Auditor',
      '4.02': 'Non-Reliance on Financial Statements',
      '5.01': 'Change in Control',
      '5.02': 'Director or Officer Change',
      '5.03': 'Amendment to Charter or Bylaws',
      '5.07': 'Shareholder Vote Results',
      '5.08': 'Director Nominations',
      '7.01': 'Regulation FD Disclosure',
      '8.01': 'Other Events',
      '9.01': 'Financial Statements and Exhibits',
    };

    function formatItems(itemsStr) {
      if (!itemsStr) return '';
      return itemsStr.split(',')
        .map(i => ITEM_LABELS[i.trim()] || `Item ${i.trim()}`)
        .join(' · ');
    }

    function toSlug(name) {
      return (name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function renderFilings(filings, newAccessionNos = []) {
      const feed = document.getElementById('news-feed');
      const newSet = new Set(newAccessionNos);

      if (!filings || filings.length === 0) {
        feed.innerHTML = '<p class="state-msg">No filings found. Click Refresh to load data.</p>';
        return;
      }

      feed.innerHTML = filings.map(f => {
        const cikInt = parseInt(f.cik, 10) || '';
        const slug = toSlug(f.company_name);
        const bamsecUrl = cikInt ? `https://www.bamsec.com/companies/${cikInt}/${slug}` : '';
        const isNew = newSet.has(f.accession_no);
        const newBadge = isNew ? '<span class="new-badge">NEW</span>' : '';

        const priority = classifyFiling(f);
        const priorityBadge = priority === 'high' ? '<span class="priority-badge">KEY EVENT</span>' : '';
        const priorityClass = (priority === 'high' || priority === 'low') ? ` priority-${priority}` : '';

        const description = formatItems(f.title);

        const secLink = f.primary_doc_url
          ? `<a href="${escHtml(f.primary_doc_url)}" target="_blank" rel="noopener">SEC Filing</a>`
          : '';
        const bamsecLink = bamsecUrl
          ? `<a href="${escHtml(bamsecUrl)}" target="_blank" rel="noopener">BAMSec</a>`
          : '';
        const links = [secLink, bamsecLink].filter(Boolean).join(' · ');

        return `
          <div class="filing-card${isNew ? ' is-new' : ''}${priorityClass}">
            <div class="filing-meta">
              <span class="filing-ticker">${escHtml(f.ticker || '')}</span>
              <span class="filing-company">${escHtml(f.company_name || '')}</span>
              <span class="filing-form">${escHtml(f.form_type || '8-K')}</span>
              ${newBadge}${priorityBadge}
              <span class="filing-date">${escHtml(f.filed_date || '')}</span>
            </div>
            ${description ? `<div class="filing-description">${escHtml(description)}</div>` : ''}
            ${f.summary ? `<div class="filing-summary">${escHtml(f.summary)}</div>` : ''}
            ${links ? `<div class="filing-links">${links}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function setLastRefreshed(isoStr) {
      const el = document.getElementById('last-refreshed');
      if (!isoStr) { el.textContent = ''; return; }
      try {
        const d = new Date(isoStr + 'Z');  // treat as UTC
        el.textContent = 'Last refreshed: ' + d.toLocaleString([], {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
      } catch (e) {
        el.textContent = '';
      }
    }

    // ── Manual refresh ────────────────────────────────────────────────────────

    async function triggerRefresh() {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = '⟳ Refreshing...';

      try {
        const res = await fetch('/api/refresh', { method: 'POST' });
        const data = await res.json();
        const newAccessionNos = data.new_accession_nos || [];

        // Re-filter to current company view if needed
        let filings = data.filings || [];
        if (currentCik) {
          filings = filings.filter(f => f.cik === currentCik);
        }

        await loadCompanies();
        renderFilings(filings, newAccessionNos);
        setLastRefreshed(data.last_refreshed);

        if (newAccessionNos.length > 0) {
          btn.textContent = `✓ ${newAccessionNos.length} new`;
        } else {
          btn.textContent = '✓ Up to date';
        }
      } catch (e) {
        btn.textContent = 'Error';
        console.error('Refresh failed:', e);
      } finally {
        await loadCompanies();
      }

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = 'Refresh';
      }, 3000);
    }

    // ── Utilities ─────────────────────────────────────────────────────────────

    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Initial load ──────────────────────────────────────────────────────────
    loadCompanies().then(() => loadNews(''));
  </script>
</body>
</html>
